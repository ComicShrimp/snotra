[pycodestyle]
max-line-length = 88
exclude = migrations,snapshots,vendored

[isort]
profile = black
skip=migrations,snapshots,vendored

[flake8]
max-line-length = 88
extend-ignore = E203, E501
exclude = migrations,snapshots,vendored

[tool:pytest]
markers =
    integration: marks tests as integration (deselect with '-m "not integration"')
    slow: marks tests as slow (deselect with '-m "not slow"')
    e2e: marks testes as end-to-end, generally tests for controllers(web and workers) (deselect with '-m "not e2e"')

# https://github.com/samuelcolvin/aioaws/blob/master/setup.cfg
# https://github.com/urllib3/urllib3/blob/main/setup.cfg
[mypy]
plugins = pydantic.mypy,sqlalchemy.ext.mypy.plugin
exclude = ['migrations/','vendored']
check_untyped_defs = True
disallow_any_generics = True
disallow_incomplete_defs = True
disallow_subclassing_any = True
disallow_untyped_calls = True
disallow_untyped_decorators = True
disallow_untyped_defs = True
no_implicit_optional = True
no_implicit_reexport = True
show_error_codes = True
strict_equality = True
warn_redundant_casts = True
warn_return_any = True
warn_unused_configs = True
warn_unused_ignores = True

strict_optional = True
follow_imports = normal

[mypy-jose.*]
ignore_missing_imports = True

[mypy-snapshottest.*]
ignore_missing_imports = True